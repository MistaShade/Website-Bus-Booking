<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoBus | Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-page">
      <section class="auth-card">
        <h1 class="auth-title">Welcome to GoBus!</h1>
        <p class="auth-subtitle">Login to start your journey</p>

        <p id="auth-page-error" class="auth-error" role="alert" hidden></p>

        <form id="login-form" class="auth-form">
          <div class="field-group">
            <label class="field-label" for="login-email">Email</label>
            <input
              id="login-email"
              class="field-input"
              type="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="login-password">Password</label>
            <input
              id="login-password"
              class="field-input"
              type="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary full-width" id="login-submit-btn">
            Login
          </button>
          <p id="login-status" class="auth-status" aria-live="polite"></p>
        </form>

        <p class="auth-switch">
          Don't have an account?
          <a href="register.html">Register here.</a>
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="gobusAuth.js"></script>
    <script src="auth.js"></script>
  </body>
  </html>
